<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <title>Fitness Tracker</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">

    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.14.7/dist/umd/popper.min.js" integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/js/bootstrap.min.js" integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM" crossorigin="anonymous"></script>
    <link rel="stylesheet" th:href="@{/start.css}">
</head>
<body>
    <div th:replace="fragments/topnav :: navbar"></div>
    <h2 th:text="'Hello ' + ${account.accountName}" />
    <h4>Here are your Goals:</h4>

    <div class="container-fluid d-flex" style="height: 400px;">
        <div class="overflow-auto w-50" style="max-height: 100%;">
            <div class="card">
                <img th:src="@{/images/placeholderbadge.png}" class="card-img-top" alt="...">
                <div class="card-body">
                    <h5 class="card-title" th:text="${dGoal.goalType}" />
                    <p class="card-text" th:text="${dGoal.DistanceToComplete} + '/' + ${dGoal.DistanceCompleted} + ' Completed'" />
                    <a href="#" class="btn btn-primary">Go somewhere</a>
                </div>
            </div>
            <div class="card">
                <img th:src="@{/images/placeholderbadge.png}" class="card-img-top" alt="...">
                <div class="card-body">
                    <h5 class="card-title" th:text="${repGoal.goalType}" />
                    <p class="card-text" th:text="${repGoal.repsCompleted} + '/' + ${repGoal.repsToComplete} + ' Completed'" />
                    <a href="#" class="btn btn-primary">Go somewhere</a>
                </div>
            </div>
        </div>
        <div class="otherButtons w-50 d-flex flex-column gap-3">
            <a href="#" class="btn btn-primary">Check Calendar</a>
            <a href="#" class="btn btn-primary">Create Goal</a>
        </div>
    </div>
</body>
</html>
